# Resolve conflito de rebase no .github/workflows/project-gate.yml
# 1. Sobrescreve com YAML final limpo

name: project-gate

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Show Python version
      run: python --version

    - name: Upgrade pip
      run: python -m pip install --upgrade pip

    - name: Install pytest
      run: pip install pytest

    - name: Instalar dependências opcionais
      shell: pwsh
      run: |
        if (Test-Path requirements.txt) { pip install -r requirements.txt }
        if (Test-Path requirements-dev.txt) { pip install -r requirements-dev.txt }
        if (Test-Path pyproject.toml) { pip install -e . }
        if (Test-Path setup.py) { pip install -e . }

    - name: Diagnóstico
      shell: pwsh
      run: |
        Get-Location
        git rev-parse HEAD
        Get-ChildItem .
        Get-ChildItem scripts
        if (-not (Test-Path scripts/run_project_gate.py)) {
          Write-Error "scripts/run_project_gate.py não encontrado"
          exit 1
        }

    - name: Pip list
      run: pip list

    - name: Run project gate
      run: python scripts/run_project_gate.py
