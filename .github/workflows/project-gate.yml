name: project-gate

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: windows-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalar dependências
        shell: pwsh
        run: |
          pip install pytest
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }
          if (Test-Path requirements-dev.txt) {
            pip install -r requirements-dev.txt
          }
          if (Test-Path pyproject.toml) {
            pip install -e .
            if ($LASTEXITCODE -ne 0) {
              Write-Output "Aviso: falha na instalação editable via pyproject.toml, continuando..."
            }
          }
          if (Test-Path setup.py) {
            pip install -e .
            if ($LASTEXITCODE -ne 0) {
              Write-Output "Aviso: falha na instalação editable via setup.py, continuando..."
            }
          }

      - name: Listar pacotes instalados
        shell: pwsh
        run: pip list

      - name: Diagnóstico e verificação do script
        shell: pwsh
        run: |
          Write-Output "::group::Informações básicas"
          Write-Output "Diretório atual: $(Get-Location)"
          Write-Output "Commit: $(git rev-parse HEAD)"
          Write-Output "::endgroup::"
          Write-Output "::group::Arquivos na raiz"
          Get-ChildItem -Name | ForEach-Object { Write-Output $_ }
          Write-Output "::endgroup::"
          Write-Output "::group::Pasta scripts"
          if (Test-Path scripts) {
            Get-ChildItem scripts -Name | ForEach-Object { Write-Output $_ }
          } else {
            Write-Output "Pasta scripts não existe."
          }
          Write-Output "::endgroup::"
          $scriptPath = 'scripts/run_project_gate.py'
          if (Test-Path $scriptPath) {
            Write-Output "✓ $scriptPath existe e está pronto."
          } else {
            Write-Error "ERRO: $scriptPath não encontrado!"
            exit 1
          }

      - name: Executar project gate
        shell: pwsh
        run: python scripts/run_project_gate.py
