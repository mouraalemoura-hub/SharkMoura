### ARQUIVO: .github/workflows/project-gate.yml
name: project-gate

on:
  push:
  pull_request:

jobs:
  gate:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt', '**/pyproject.toml', '**/setup.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Show Python version
        run: python --version

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install pytest
        run: pip install pytest

      - name: Install project dependencies
        shell: pwsh
        run: |
          if (Test-Path requirements.txt) { pip install -r requirements.txt }
          if (Test-Path requirements-dev.txt) { pip install -r requirements-dev.txt }
          if (Test-Path pyproject.toml) { try { pip install -e . } catch { Write-Host "Failed to install from pyproject.toml, continuing" } }
          if (Test-Path setup.py) { try { pip install -e . } catch { Write-Host "Failed to install from setup.py, continuing" } }

      - name: Show pip list
        run: pip list

      - name: Run project gate
        run: python scripts/run_project_gate.py